name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r api/requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check api tests execution/filters.py execution/eval

      - name: Unit tests (pytest)
        run: pytest

      - name: Filter eval (precision/recall gate)
        run: python execution/eval/eval_filters.py
